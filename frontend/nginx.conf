server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy reverso: tudo que chega em /api vai para o container da API.
    # Mantém o frontend e a API na mesma origem -> dispensa CORS.
    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA: qualquer rota cai no index.html (React Router cuida do roteamento).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
